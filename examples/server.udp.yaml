# Example only. Do not reuse this fixed demo secret in production. Generate a random secret with `knock-proxy init server ...` or `openssl rand -base64 32`.
mode: server

server:
  tcp_listen: "127.0.0.1:10443"
  upstream: "127.0.0.1:22"

access:
  mode: "proxy"
  require_tcp_auth: true

knock:
  method: "udp"
  udp_listen: "127.0.0.1:10443"
  udp_knock_port: 10443
  log_invalid_knock: false
  time_window_seconds: 30

auth:
  frame: "envelope-v2"
  hint_mode: "route-hint"
  frame_size_buckets: [128, 192, 256, 384, 512]
  padding_policy: "random-bucket"
  fail_delay_jitter_min: "20ms"
  fail_delay_jitter_max: "80ms"
  time_window_seconds: 30
  nonce_cache_seconds: 300
  clients:
    - client_id: "client-001"
      secret: "base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      max_connections: 16

firewall:
  backend: "auto"
  port: 10443
  default_action: "drop"
  allow_seconds: 15
  remove_after_auth: true
  drop_udp_knock_port: false

transport:
  encryption: false
  method: "chacha20-poly1305"

log:
  level: "info"
  format: "text"
