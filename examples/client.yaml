# Example only. Do not reuse this fixed demo secret in production. Generate a random secret with `knock-proxy init server ...` or `openssl rand -base64 32`.
mode: client

client:
  listen: "127.0.0.1:10022"
  server_addr: "example.com:443"
  client_id: "client-001"
  secret: "base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="

knock:
  method: "tcp-syn"
  udp_knock_port: 443
  timeout_seconds: 3
  retry: 2
  time_window_seconds: 30

auth:
  frame: "envelope-v2"
  hint_mode: "route-hint"
  frame_size_buckets: [128, 192, 256, 384, 512]
  padding_policy: "random-bucket"

transport:
  encryption: false
  method: "chacha20-poly1305"

timeouts:
  connect_seconds: 5
  auth_seconds: 5
  idle_seconds: 300

log:
  level: "info"
  format: "text"
