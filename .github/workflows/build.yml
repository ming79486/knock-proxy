name: build

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOPRIVATE: github.com/ming79486/libknock
  GONOSUMDB: github.com/ming79486/libknock

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Configure private libknock access
        env:
          LIBKNOCK_READ_TOKEN: ${{ secrets.LIBKNOCK_READ_TOKEN }}
        run: |
          if [ -z "$LIBKNOCK_READ_TOKEN" ]; then
            echo "::error::Set repository secret LIBKNOCK_READ_TOKEN with read access to github.com/ming79486/libknock"
            exit 1
          fi
          git config --global url."https://x-access-token:${LIBKNOCK_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Configure private libknock access
        env:
          LIBKNOCK_READ_TOKEN: ${{ secrets.LIBKNOCK_READ_TOKEN }}
        run: |
          if [ -z "$LIBKNOCK_READ_TOKEN" ]; then
            echo "::error::Set repository secret LIBKNOCK_READ_TOKEN with read access to github.com/ming79486/libknock"
            exit 1
          fi
          git config --global url."https://x-access-token:${LIBKNOCK_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          name="knock-proxy-${GOOS}-${GOARCH}${{ matrix.ext }}"
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA::7}"
          date="$(TZ=Asia/Shanghai date +%Y-%m-%d-%H-%M)"
          go build -trimpath -ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}" -o "dist/${name}" ./cmd/knock-proxy
          if [ "${GOOS}" = "windows" ]; then
            (cd dist && zip "${name%.exe}.zip" "${name}")
          else
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: knock-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
